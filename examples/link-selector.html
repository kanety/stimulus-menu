<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script async src="https://cdn.jsdelivr.net/npm/es-module-shims@1.3.0/dist/es-module-shims.js"></script>
  <script type="importmap">
    {
      "imports": {
        "@hotwired/stimulus": "https://cdn.jsdelivr.net/npm/@hotwired/stimulus@3.0.1/dist/stimulus.js",
        "@kanety/stimulus-static-actions": "https://cdn.jsdelivr.net/npm/@kanety/stimulus-static-actions@1.0.1/dist/index.module.js",
        "@kanety/stimulus-menu": "../dist/index.module.js"
      }
    }
  </script>
  <script type="module">
    import { Application, Controller } from '@hotwired/stimulus';
    import MenuController from '@kanety/stimulus-menu';
    const application = Application.start();
    application.register('menu', MenuController);
  </script>
  <link rel="stylesheet" href="../dist/index.css"></link>
</head>
<body>
  <h1>Horizontal menu</h1>
  <ul class="st-menu st-menu--horizontal" data-controller="menu" data-menu-link-selector-value=".menu-link">
    <li>
      <span class="st-menu__icon"><a href="#Menu1" class="menu-link">Root Menu1</a></span>
      <ul class="st-menu--vertical">
        <li><span><a href="#Menu1-1" class="menu-link">Menu1-1</a></span></li>
        <li>
          <span class="st-menu__icon"><a href="#Menu1-2" class="menu-link">Menu1-2</a></span>
          <span><a href="#External-link">(External-link)</span></span>
          <ul class="st-menu--vertical">
            <li><span><a href="#Menu1-1-1" class="menu-link">Menu1-1-1</a></span></li>
            <li><span><a href="#Menu1-1-2" class="menu-link">Menu1-1-2</a></span></li>
          </ul>
        </li>
      </ul>
    </li>
  </ul>
</body>
</html>
